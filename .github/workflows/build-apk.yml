name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Install SDK 35
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install deps + build
        run: npm install && npm run build
        env:
          VITE_API_URL: https://server-hub-v5-wrpt.onrender.com

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          echo "JAVA_HOME=$JAVA_HOME"
          ls $ANDROID_HOME/platforms/
          ./gradlew assembleDebug --no-daemon --info 2>&1

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SERVER-HUB-APK
          path: frontend/android/app/build/outputs/apk/debug/*.apk
